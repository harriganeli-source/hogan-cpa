<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <!-- Thin enclosing circle -->
  <circle cx="120" cy="120" r="108" fill="none" stroke="#C9974A" stroke-width="2.5" opacity="0.8"/>
  <!-- H stems — sharp rectangular, no rounding -->
  <rect x="60" y="48" width="22" height="144" fill="#ffffff"/>
  <rect x="158" y="48" width="22" height="144" fill="#ffffff"/>
  <!-- Checkmark — thin, geometric, square linecaps, miter joint -->
  <polyline points="54,132 103,170 186,70"
            fill="none"
            stroke="#C9974A"
            stroke-width="16"
            stroke-linecap="square"
            stroke-linejoin="miter"/>
</svg>
